<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phishing Detector</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🔐 Phishing URL Detector</h1>
        <p class="subtitle">Multi-factor heuristic analysis engine</p>
    </div>

    <div class="input-row">
        <input
            type="text"
            id="urlInput"
            placeholder="https://example.com"
            autocomplete="off"
            spellcheck="false"
        >
        <button id="checkBtn" onclick="checkURL()">Analyze</button>
    </div>

    <div id="loader" class="loader hidden">Analyzing URL…</div>
    <div id="result"></div>
</div>

<script src="/static/script.js"></script>
</body>
</html>
